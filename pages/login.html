<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Chathuranga Classes</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/loader.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">
  <script>window.PL_CONFIG={title:'Student Login',subtitle:'Preparing a secure session…',brand:"Chathuranga Classes",min:800};</script>
  <script src="../js/loader.js"></script>

  <div class="bg-orbs" aria-hidden="true"><span></span><span></span><span></span></div>

  <div class="auth-wrap">
    <a href="../index.html" class="back">← Back to Home</a>

    <div class="auth-card glass">
      <h1>Student <span class="gold">Login</span></h1>
      <p class="muted">Welcome back. Continue your learning journey.</p>

      <form id="loginForm" class="form" novalidate>
        <div class="field">
          <input required type="email" name="email" placeholder=" " autocomplete="email" />
          <label>Email</label>
        </div>
        <div class="field pw">
          <input required type="password" name="password" id="lpw" placeholder=" " autocomplete="current-password" />
          <label>Password</label>
          <button type="button" class="eye" onclick="togglePw('lpw', this)" aria-label="Show password">👁</button>
        </div>

        <!-- FIX: previously had broken <li>/<a> nesting and an unclosed wrapper div -->
        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" /> Remember Me
          </label>
          <a href="register.html" class="gold register-hide">Register</a>
        </div>

        <button class="btn btn-gold-fill w-full" type="submit">Login</button>
      </form>

      <div id="alert" class="alert"></div>
    </div>
  </div>

  <!-- Hidden Admin button -->
  <button class="admin-fab" type="button"
          onclick="document.getElementById('adminModal').classList.add('open')">🔒 Admin Login</button>

  <!-- Admin Login Modal -->
  <div id="adminModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-card glass narrow">
      <button class="close" type="button" aria-label="Close"
              onclick="document.getElementById('adminModal').classList.remove('open')">×</button>
      <h2>Admin <span class="gold">Access</span></h2>
      <p class="muted">Authorized personnel only.</p>
      <form id="adminForm" class="form" novalidate>
        <div class="field">
          <input required type="email" name="email" placeholder=" " autocomplete="email" />
          <label>Admin Email</label>
        </div>
        <div class="field pw">
          <input required type="password" name="password" id="apw" placeholder=" " autocomplete="current-password" />
          <label>Admin Password</label>
          <button type="button" class="eye" onclick="togglePw('apw', this)" aria-label="Show password">👁</button>
        </div>
        <button class="btn btn-primary w-full" type="submit">Enter Admin Panel</button>
      </form>
      <div id="adminAlert" class="alert"></div>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD7ujM1Yb1laA91ESAakI51nXkGmIqKljU",
      authDomain: "chathuranga-classes-web.firebaseapp.com",
      projectId: "chathuranga-classes-web",
      projectId: "chathuranga-classes-web",
      storageBucket: "chathuranga-classes-web.firebasestorage.app",
      messagingSenderId: "17337438971",
      appId: "1:17337438971:web:a35e7f99e98fac218dd65e",
      measurementId: "G-3MV818KY28"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <script src="../js/app.js"></script>

  <script>
    /* -------- Student login -------- */
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const btn = f.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const email = f.email.value;
      const password = f.password.value;
      const rememberMe = document.getElementById('rememberMe').checked;

      const result = await loginStudentFirebase(email, password, rememberMe);

      if (result.ok) {
        window.location.href = '../index.html';
      } else {
        showAlert(result.message || 'Login failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });

    /* -------- Admin login -------- */
    document.getElementById('adminForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const email = f.email.value.trim().toLowerCase();
      const password = f.password.value;
      const a = document.getElementById('adminAlert');

      const r = await loginAdmin(email, password);
      if (!r.ok) {
        a.className = 'alert error show';
        a.textContent = r.message;
        return;
      }
      a.className = 'alert success show';
      a.textContent = 'Welcome Admin!';
      setTimeout(() => { location.href = 'admin.html'; }, 700);
    });
  </script>
</body>
</html>
